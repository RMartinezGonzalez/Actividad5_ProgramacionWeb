<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/RMartinezGonzalez/Componentes_ProgramacionWeb@v1.0.0/componente.css">
    <script src="https://cdn.jsdelivr.net/gh/RMartinezGonzalez/Componentes_ProgramacionWeb@v1.0.0/componente.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/RMartinezGonzalez/Componentes_ProgramacionWeb@v1.0.0/utileria.js"></script>
    <script src="./js/script.js" defer></script>
</head>
<body>
    <div id="tooltip" class="tooltip-oculto"></div>
    <main class="bg-black rounded-md py-[40px] px-[50px] flex flex-col gap-4 items-center text-[var(--color-blanco)]">
        <h1 class="text-[30px] font-semibold">Login</h1> 
        <form class="flex flex-col gap-12 relative w-[300px]">
            <div class="flex flex-col gap-1">
                <label for="">Correo:</label>
                <input id="correo-input" type="text" placeholder="Ej: Wilfrino Sánchez" class="w-full py-2 px-[10px] rounded-sm text-[var(--color-verde-medio)]" oninput="validarCorreo(); mostrarTooltip(this);" data-texto="Ingrese correo válido" data-tipo="input-tooltip-valido">
            </div>
            <div class="flex flex-col gap-1">
                <label for="">Contraseña:</label>
                <input id="contra-input" type="password" placeholder="Ej: Al*2J<d" class="w-full py-2 px-[10px] rounded-sm text-[var(--color-verde-medio)]" oninput="validarContra(); mostrarTooltip(this);" data-texto="Ingrese contraseña válida" data-tipo="input-tooltip-valido">
            </div>
            <div class="flex flex-col items-center">
                <button type="button" class="boton" onclick="validarLogin()">Iniciar Sesión</button>
            </div>
        </section>
    </main>
</button>
</body>
</html>
